name: ds-cradio
model_repo: /models

# Top-level input: image URL/path + MIME type.
input:
  - name: "media_url"
    data_type: TYPE_STRING
    dims: [ -1 ]
  - name: "mime"
    data_type: TYPE_STRING
    dims: [ -1 ]

# Top-level output: detections + per-detection embeddings
output:
  - name: "detections"
    data_type: TYPE_CUSTOM_OBJECT
    dims: [ -1 ]
  - name: "summary"
    data_type: TYPE_FP32
    dims: [-1, -1]
  - name: "spatial_features"
    data_type: TYPE_FP32
    dims: [-1, -1, -1]

models:
  # Stage 1: PeopleNet Transformer (object detection via DeepStream)
  - name: peoplenet
    backend: "deepstream/nvinfer"
    max_batch_size: 1
    input:
      - name: "image_bytes"
        data_type: TYPE_CUSTOM_DS_IMAGE
        dims: [ -1 ]
      - name: "media_url"
        data_type: TYPE_CUSTOM_DS_MEDIA_URL
        dims: [ -1 ]
      - name: "mime"
        data_type: TYPE_CUSTOM_DS_MIME
        dims: [1]
    output:
      - name: "detections"
        data_type: TYPE_CUSTOM_DS_METADATA
        dims: [ -1 ]
      - name: "decoded_frames"
        data_type: TYPE_CUSTOM_DS_IMAGE
        dims: [-1, 3]
    parameters:
      infer_config_path:
        - nvdsinfer_config.yaml
      inference_timeout: 10
    postprocessors:
      # After DS inference: crop each detected bbox from decoded_frames,
      # resize+normalize for C-RADIO, and return a stacked [N,3,256,256]
      # tensor.  Because peoplenet is on the implicit path the tensor
      # flows directly to cradio via kwargs (no stack_tensors_in_dict).
      - kind: "custom"
        name: "bbox-crop-postprocessor"
        input: ["detections", "decoded_frames"]
        output: ["pixel_values", "detections"]
        config:
          max_crops: 16  # must match cradio_v3_h max_batch_size below

  # Stage 2: C-RADIOv3-H (per-crop embedding via TensorRT)
  - name: cradio_v3_h
    backend: "polygraphy"
    max_batch_size: 16
    input:
      - name: "pixel_values"
        data_type: TYPE_FP32
        dims: [3, 256, 256]
    output:
      - name: "summary"
        data_type: TYPE_FP32
        dims: [-1, -1]
      - name: "spatial_features"
        data_type: TYPE_FP32
        dims: [-1, -1, -1]
    parameters:
      tensorrt_engine: "model.plan"

routes:
  ':[\"media_url\", \"mime\"]': 'peoplenet'
  'peoplenet:[\"pixel_values\"]': 'cradio_v3_h'
  'peoplenet:[\"detections\"]': ':'
  'cradio_v3_h:[\"summary\", \"spatial_features\"]': ':'
