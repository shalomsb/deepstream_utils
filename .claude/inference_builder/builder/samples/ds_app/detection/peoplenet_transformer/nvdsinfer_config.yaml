# Reference configuration for PeopleNetTransformer v2

class-attrs-all:
  pre-cluster-threshold: 0.3
  topk: 20

property:
  gpu-id: 0
  offsets: "123.675;116.28;103.53"
  net-scale-factor: 0.0173520735728
  labelfile-path: labels.txt
  onnx-file: resnet50_peoplenet_transformer_op17.onnx

  # 0=FP32, 1=INT8, 2=FP16 mode
  network-mode: 2
  network-type: 0 # detection
  num-detected-classes: 4 # BG, Person, Face, Bag
  gie-unique-id: 1
  output-blob-names: pred_boxes;pred_logits
  infer-dims: 3;544;960
  cluster-mode: 4
  parse-bbox-func-name: NvDsInferParseCustomDDETRTAO
  custom-lib-path: /opt/nvidia/deepstream/deepstream/lib/libnvds_infercustomparser_tao.so
