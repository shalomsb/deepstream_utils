name: "deepstream-app"
model_repo: "/workspace/models"

input:
- name: media_url
  data_type: TYPE_CUSTOM_LIST
  dims: [ -1 ]
- name: mime
  data_type: TYPE_CUSTOM_DS_MIME
  dims: [ -1 ]

output:
  - name: output
    data_type: TYPE_CUSTOM_DS_METADATA
    dims: [ -1 ]

models:
- name: citysemsegformer
  backend: deepstream/nvinfer
  max_batch_size: "$MAX_BATCH_SIZE|2"
  input:
  - name: images
    data_type: TYPE_CUSTOM_DS_IMAGE
    dims: [ -1 ]
    optional: true
  - name: media_url
    data_type: TYPE_CUSTOM_DS_MEDIA_URL
    dims: [ -1 ]
  - name: mime
    data_type: TYPE_CUSTOM_DS_MIME
    dims: [ -1 ]
  output:
  - name: output
    data_type: TYPE_CUSTOM_DS_METADATA
    dims: [ -1 ]
  parameters:
    # timeout in microseconds for batching multiple inputs
    batch_timeout: 33333
    infer_config_path:
      - nvdsinfer_config.yaml
    render_config:
      enable_display: "$ENABLE_DISPLAY|true"
      # enable segmentation mask visualization
      seg_mask_visualization:
        width: 1820
        height: 1024
      # enable_osd: true
      # enable_stream: true
      # rtsp_mount_point: /ds_app
      # rtsp_port: 8554
    inference_timeout: "$INFERENCE_TIMEOUT|5"