name: "tao"
model_repo: "/workspace/.cache/model-repo"

input:
- name: source_config
  data_type: TYPE_CUSTOM_DS_SOURCE_CONFIG
  dims: [ -1 ]

output:
  - name: output
    data_type: TYPE_CUSTOM_DS_METADATA
    dims: [ -1 ]

server:
  # map server implementation to the operation endpoint
  responders:
    infer:
      operation: inference
      requests:
        InferenceRequest: >
          {
            "source_config": "live_source.yaml"
          }
      responses:
        InferenceResponse: >
          {
            "data": [
              {% for item in response.output %} {
                "index": {{loop.index0}},
                "shape": {{item["shape"]}},
                "bboxes": {{item["bboxes"]}},
                "probs": {{item["probs"]}},
                "labels": {{item["labels"]|tojson}},
                "masks": {{item["seg_maps"]}}
              } {% if not loop.last %}, {% endif %} {% endfor %}
            ],
            "usage": { "num_images": 1},
            "model": "nvidia/nvdinov2"
          }
    healthy_ready:
      operation: health_ready_v1_health_ready_get

models:
- name: tao
  backend: deepstream/nvinfer
  max_batch_size: "$MAX_BATCH_SIZE|1"
  input:
  - name: source_config
    data_type: TYPE_CUSTOM_DS_SOURCE_CONFIG
    dims: [ -1 ]
  output:
  - name: output
    data_type: TYPE_CUSTOM_DS_METADATA
    dims: [ -1 ]
  parameters:
    infer_config_path:
      - nvdsinfer_config.yaml