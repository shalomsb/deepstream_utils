name: "test-app"
model_repo: "/workspace/models"

server:
  responders:
    healthy_ready:
      operation: health_ready_v1_health_ready_get
    add_file:
      operation: add_media_file
      responses:
        AddFileResponse: >
          {
            "data": {
              "id": {{response.id|tojson}},
              "path": {{response.path|tojson}},
              "size": {{response.size|tojson}},
              "duration": {{response.duration|tojson}},
              "contentType": {{response.mime_type|tojson}}
            }
          }
    list_files:
      operation: list_media_files
      responses:
        ListFilesResponse: >
          {
            "data": [
              {% for item in response.assets %} {
                "id": {{item.id|tojson}},
                "path": {{item.path|tojson}},
                "size": {{item.size|tojson}},
                "contentType": {{item.mime_type|tojson}}
              } {% if not loop.last %}, {% endif %} {% endfor %}
            ]
          }
    add_live_stream:
      operation: add_live_stream
    del_live_stream:
      operation: delete_live_stream
      responses:
        DeleteAssetResponse: >
          {
            "deleted": {{response.status|tojson}}
          }
    list_live_streams:
      operation: list_live_streams
    infer:
      operation: inference
      responses:
        InferenceResponse: >
          {
            "data": [
              {
                "index": 0,
                "timestamp": 0,
                "output": {{response.output|tojson}}
              }
            ]
          }

input:
  - name: "input"
    data_type: TYPE_CUSTOM_LONG_VIDEO_ASSETS
    dims: [ -1 ]
    optional: true

models:
- name: dummy
  backend: dummy
  max_batch_size: 1
  input:
  - name: media_frames
    data_type: TYPE_FP32
    dims: [ -1, -1, -1, -1]
  output:
  - name: output
    data_type: TYPE_FP32
    dims: [ 1 ]
  preprocessors:
  - kind: "custom"
    name: "frame-picker"
    input: ["input"]
    output: ["media_frames"]
    config: { "num_frames": 10 }

routes: {
  ':["input"]': 'dummy',
  'dummy:["output"]': ':'
}