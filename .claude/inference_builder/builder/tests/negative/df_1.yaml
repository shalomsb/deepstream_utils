name: "test-app"
model_repo: "/workspace/models"

input:
  - name: "base64"
    data_type: TYPE_CUSTOM_BINARY_BASE64
    dims: [ -1 ]

output:
  - name: "output"
    data_type: TYPE_FP32
    dims: [ 1 ]

server:
  responders:
    healthy_ready:
      operation: health_ready_v1_health_ready_get
    infer:
      operation: inference
      requests:
        InferenceRequest: >
          {
            "base64": ["hello"]
          }
      responses:
        InferenceResponse: >
          {
            "data": {{ response.outputs | tojson }}
          }

models:
- name: dummy
  backend: dummy
  max_batch_size: 1
  input:
  - name: inputs
    data_type: TYPE_STRING
    dims: [ -1]
  output:
  - name: output
    data_type: TYPE_FP32
    dims: [ 1 ]

routes: {
  ':["base64"]': 'dummy:["inputs"]',
  'dummy:["output"]': ':'
}
