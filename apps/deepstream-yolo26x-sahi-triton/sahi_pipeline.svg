<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1980" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="1980" fill="#fafafa"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">SAHI Pipeline · TensorRT Engines</text>
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="#64748b">1280×720 input → YOLO26n@640 (6 tiles, overlap 0.2) → merged detections</text>

  <!-- ============ INPUT FRAME ============ -->
  <text x="450" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">INPUT FRAME · 1280 × 720 RGB</text>

  <!-- Frame outline (scale 0.375 → 480×270) -->
  <rect x="210" y="125" width="480" height="270" fill="white" stroke="#334155" stroke-width="2"/>

  <!-- 6 Tile rectangles (border-only for clarity) -->
  <rect x="210" y="125" width="240" height="240" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-width="2"/>
  <rect x="402" y="125" width="240" height="240" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="2"/>
  <rect x="450" y="125" width="240" height="240" fill="#10b981" fill-opacity="0.06" stroke="#10b981" stroke-width="2"/>
  <rect x="210" y="155" width="240" height="240" fill="#a855f7" fill-opacity="0.06" stroke="#a855f7" stroke-width="2"/>
  <rect x="402" y="155" width="240" height="240" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="2"/>
  <rect x="450" y="155" width="240" height="240" fill="#06b6d4" fill-opacity="0.06" stroke="#06b6d4" stroke-width="2"/>

  <!-- Tile labels (on outer corners only to avoid clutter) -->
  <circle cx="222" cy="137" r="10" fill="#3b82f6"/>
  <text x="222" y="141" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>

  <circle cx="678" cy="137" r="10" fill="#10b981"/>
  <text x="678" y="141" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>

  <circle cx="222" cy="383" r="10" fill="#a855f7"/>
  <text x="222" y="387" text-anchor="middle" font-size="11" font-weight="700" fill="white">4</text>

  <circle cx="678" cy="383" r="10" fill="#06b6d4"/>
  <text x="678" y="387" text-anchor="middle" font-size="11" font-weight="700" fill="white">6</text>

  <circle cx="528" cy="260" r="10" fill="#ef4444"/>
  <text x="528" y="264" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>

  <!-- Tile coordinates legend -->
  <text x="210" y="418" font-size="11" font-family="ui-monospace, monospace" fill="#334155">T1 (   0,  0,  640, 640)   T2 ( 512,  0, 1152, 640)   T3 ( 640,  0, 1280, 640)</text>
  <text x="210" y="434" font-size="11" font-family="ui-monospace, monospace" fill="#334155">T4 (   0, 80,  640, 720)   T5 ( 512, 80, 1152, 720)   T6 ( 640, 80, 1280, 720)</text>

  <!-- Arrow to Stage 1 -->
  <line x1="450" y1="455" x2="450" y2="500" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="465" width="240" height="26" fill="#dbeafe" stroke="#3b82f6" rx="4"/>
  <text x="620" y="483" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#1e3a8a">uint8  [1, 3, 720, 1280]</text>

  <!-- ============ STAGE 1 ============ -->
  <rect x="120" y="510" width="660" height="135" fill="white" stroke="#0ea5e9" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="140" y="535" font-size="14" font-weight="700" fill="#0369a1">STAGE 1 · preprocess.plan  (TensorRT, fixed shape)</text>
  <text x="140" y="562" font-size="12" fill="#334155" font-family="ui-monospace, monospace">  6× Slice    constant tile indices baked at build time</text>
  <text x="140" y="582" font-size="12" fill="#334155" font-family="ui-monospace, monospace">  Concat      stack tiles along batch axis</text>
  <text x="140" y="602" font-size="12" fill="#334155" font-family="ui-monospace, monospace">  Cast        uint8 → fp32</text>
  <text x="140" y="622" font-size="12" fill="#334155" font-family="ui-monospace, monospace">  Mul         × (1/255)   normalize to [0,1]</text>

  <!-- Arrow to Stage 2 -->
  <line x1="450" y1="655" x2="450" y2="700" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="665" width="240" height="26" fill="#dbeafe" stroke="#3b82f6" rx="4"/>
  <text x="620" y="683" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#1e3a8a">fp32  [6, 3, 640, 640]</text>

  <!-- ============ STAGE 2 ============ -->
  <rect x="120" y="710" width="660" height="115" fill="white" stroke="#0ea5e9" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="140" y="735" font-size="14" font-weight="700" fill="#0369a1">STAGE 2 · yolo26n.plan  (TensorRT, dynamic batch)</text>
  <text x="140" y="762" font-size="12" fill="#334155">YOLO26n backbone + neck + head</text>
  <text x="140" y="782" font-size="12" font-family="ui-monospace, monospace" fill="#334155">+ EfficientNMS_TRT  per-tile NMS, top-100 per tile</text>
  <text x="140" y="805" font-size="11" fill="#64748b">all 6 tiles processed in parallel as one TRT batch</text>

  <!-- Split into 4 outputs -->
  <line x1="450" y1="835" x2="450" y2="858" stroke="#374151" stroke-width="2"/>
  <line x1="180" y1="858" x2="720" y2="858" stroke="#374151" stroke-width="2"/>
  <line x1="225" y1="858" x2="225" y2="888" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="375" y1="858" x2="375" y2="888" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="525" y1="858" x2="525" y2="888" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="675" y1="858" x2="675" y2="888" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="155" y="893" width="140" height="46" fill="#fef3c7" stroke="#f59e0b" rx="4"/>
  <text x="225" y="912" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">num_dets</text>
  <text x="225" y="928" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#78350f">[6, 1] int32</text>

  <rect x="305" y="893" width="140" height="46" fill="#fef3c7" stroke="#f59e0b" rx="4"/>
  <text x="375" y="912" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">det_boxes (xyxy)</text>
  <text x="375" y="928" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#78350f">[6, 100, 4] fp32</text>

  <rect x="455" y="893" width="140" height="46" fill="#fef3c7" stroke="#f59e0b" rx="4"/>
  <text x="525" y="912" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">det_scores</text>
  <text x="525" y="928" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#78350f">[6, 100] fp32</text>

  <rect x="605" y="893" width="140" height="46" fill="#fef3c7" stroke="#f59e0b" rx="4"/>
  <text x="675" y="912" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">det_classes</text>
  <text x="675" y="928" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#78350f">[6, 100] int32</text>

  <text x="450" y="965" text-anchor="middle" font-size="12" font-style="italic" fill="#dc2626">⚠  boxes are in TILE-LOCAL coordinates (range 0..640)</text>

  <line x1="450" y1="980" x2="450" y2="1015" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ STAGE 3 ============ -->
  <rect x="120" y="1025" width="660" height="135" fill="white" stroke="#0ea5e9" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="140" y="1050" font-size="14" font-weight="700" fill="#0369a1">STAGE 3 · Coordinate Translation  (Python postprocess)</text>
  <text x="140" y="1078" font-size="12" font-family="ui-monospace, monospace" fill="#334155">  for tile t in 0..5:</text>
  <text x="140" y="1097" font-size="12" font-family="ui-monospace, monospace" fill="#334155">    n = num_dets[t]</text>
  <text x="140" y="1116" font-size="12" font-family="ui-monospace, monospace" fill="#334155">    boxes[t,:n,[0,2]] += slice_bbox[t].x1   # shift x to global</text>
  <text x="140" y="1135" font-size="12" font-family="ui-monospace, monospace" fill="#334155">    boxes[t,:n,[1,3]] += slice_bbox[t].y1   # shift y to global</text>

  <line x1="450" y1="1170" x2="450" y2="1215" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="475" y="1180" width="290" height="26" fill="#dbeafe" stroke="#3b82f6" rx="4"/>
  <text x="620" y="1198" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#1e3a8a">[N_total, 4] global xyxy + scores + classes</text>

  <!-- ============ STAGE 4 ============ -->
  <rect x="60" y="1225" width="780" height="370" fill="white" stroke="#0ea5e9" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="80" y="1250" font-size="14" font-weight="700" fill="#0369a1">STAGE 4 · GREEDYNMM with IoS metric  (SAHI default)</text>

  <!-- Algorithm pseudocode (left) -->
  <text x="80" y="1278" font-size="12" font-family="ui-monospace, monospace" fill="#334155">  sort detections by score desc</text>
  <text x="80" y="1297" font-size="12" font-family="ui-monospace, monospace" fill="#334155">  for i in survivors:</text>
  <text x="80" y="1316" font-size="12" font-family="ui-monospace, monospace" fill="#334155">    overlaps = IoS(box[i], box[j&gt;i])</text>
  <text x="80" y="1335" font-size="12" font-family="ui-monospace, monospace" fill="#334155">    matches  = overlaps &gt; 0.5</text>
  <text x="80" y="1354" font-size="12" font-family="ui-monospace, monospace" fill="#334155">    box[i]   = bounding_union(box[i], matches)</text>
  <text x="80" y="1373" font-size="12" font-family="ui-monospace, monospace" fill="#334155">    suppress(matches)</text>

  <text x="80" y="1410" font-size="12" font-weight="700" fill="#0369a1">IoS = intersection / min(area_a, area_b)</text>
  <text x="80" y="1428" font-size="11" fill="#64748b">unlike IoU, fragments cleanly merge into wholes</text>

  <text x="80" y="1465" font-size="12" font-weight="700" fill="#0369a1">SAHI defaults:</text>
  <text x="80" y="1485" font-size="11" font-family="ui-monospace, monospace" fill="#334155">match_threshold = 0.5</text>
  <text x="80" y="1502" font-size="11" font-family="ui-monospace, monospace" fill="#334155">match_metric    = "IOS"</text>
  <text x="80" y="1519" font-size="11" font-family="ui-monospace, monospace" fill="#334155">class_agnostic  = False</text>

  <!-- Visual demo of cross-tile merge (right) -->
  <text x="600" y="1278" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">cross-tile merge example</text>

  <!-- Two adjacent tiles -->
  <rect x="450" y="1295" width="125" height="125" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="512" y="1290" text-anchor="middle" font-size="10" fill="#1e40af">tile A</text>

  <rect x="545" y="1295" width="125" height="125" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="608" y="1290" text-anchor="middle" font-size="10" fill="#991b1b">tile B</text>

  <!-- Two fragment detections of the same object -->
  <rect x="515" y="1330" width="42" height="58" fill="#3b82f6" fill-opacity="0.35" stroke="#1e40af" stroke-width="2"/>
  <text x="495" y="1402" font-size="10" fill="#1e40af">fragA</text>

  <rect x="550" y="1325" width="50" height="62" fill="#ef4444" fill-opacity="0.35" stroke="#991b1b" stroke-width="2"/>
  <text x="610" y="1402" font-size="10" fill="#991b1b">fragB</text>

  <!-- arrow to merged result -->
  <text x="695" y="1366" font-size="22" font-weight="700" fill="#374151">→</text>

  <!-- Merged result -->
  <rect x="720" y="1295" width="100" height="125" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="730" y="1325" width="80" height="65" fill="#10b981" fill-opacity="0.35" stroke="#065f46" stroke-width="2.5"/>
  <text x="770" y="1410" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">merged</text>

  <!-- IoS calculation -->
  <text x="600" y="1450" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#334155">IoS(fragA, fragB) ≈ 0.75  &gt;  0.5  → MERGE</text>
  <text x="600" y="1470" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">(IoU ≈ 0.32 → would NOT merge)</text>

  <text x="600" y="1505" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">merged box = bounding union of all matched boxes</text>
  <text x="600" y="1521" text-anchor="middle" font-size="11" fill="#64748b">score = max,  class = highest-scorer's class</text>

  <line x1="450" y1="1605" x2="450" y2="1650" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="490" y="1615" width="270" height="26" fill="#dcfce7" stroke="#10b981" rx="4"/>
  <text x="625" y="1633" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#065f46">[M, 4] · [M] · [M]    M ≤ N_total</text>

  <!-- ============ OUTPUT FRAME ============ -->
  <text x="450" y="1678" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">OUTPUT · final detections on original 1280×720 frame</text>

  <rect x="210" y="1695" width="480" height="270" fill="white" stroke="#334155" stroke-width="2"/>

  <!-- Final boxes -->
  <rect x="245" y="1775" width="22" height="32" fill="#10b981" fill-opacity="0.2" stroke="#065f46" stroke-width="2"/>
  <rect x="320" y="1810" width="28" height="38" fill="#10b981" fill-opacity="0.2" stroke="#065f46" stroke-width="2"/>
  <rect x="430" y="1755" width="35" height="45" fill="#10b981" fill-opacity="0.2" stroke="#065f46" stroke-width="2"/>
  <rect x="510" y="1795" width="25" height="35" fill="#10b981" fill-opacity="0.2" stroke="#065f46" stroke-width="2"/>
  <rect x="585" y="1730" width="55" height="65" fill="#10b981" fill-opacity="0.2" stroke="#065f46" stroke-width="2"/>
  <rect x="280" y="1880" width="40" height="50" fill="#10b981" fill-opacity="0.2" stroke="#065f46" stroke-width="2"/>

  <text x="450" y="1955" text-anchor="middle" font-size="11" fill="#64748b">small + cross-tile-fragment objects all recovered, fragments merged into single boxes</text>
</svg>
